<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />

<div ngToolbar aria-label="Text Formatting Tools" class="gap-6 flex px-4 py-2 rounded-lg bg-gray-100">
  <div class="gap-2 flex">
    <button
      ngToolbarWidget
      value="undo"
      type="button"
      aria-label="undo"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 material-symbols-outlined"
     translate="no">
      undo
    </button>

    <button
      ngToolbarWidget
      value="redo"
      type="button"
      aria-label="redo"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 material-symbols-outlined"
     translate="no">
      redo
    </button>
  </div>

  <div class="w-px self-center h-[calc(100%-1rem)] bg-gray-300" role="separator"></div>

  <div class="gap-2 flex">
    <button
      ngToolbarWidget
      value="bold"
      type="button"
      aria-label="bold"
      #bold="ngToolbarWidget"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 aria-pressed:text-pink-600 aria-pressed:bg-pink-500/10 material-symbols-outlined"
      [aria-pressed]="bold.selected()"
     translate="no">
      format_bold
    </button>

    <button
      ngToolbarWidget
      value="italic"
      type="button"
      aria-label="italic"
      #italic="ngToolbarWidget"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 aria-pressed:text-pink-600 aria-pressed:bg-pink-500/10 material-symbols-outlined"
      [aria-pressed]="italic.selected()"
     translate="no">
      format_italic
    </button>

    <button
      ngToolbarWidget
      value="underlined"
      type="button"
      aria-label="underlined"
      #underlined="ngToolbarWidget"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 aria-pressed:text-pink-600 aria-pressed:bg-pink-500/10 material-symbols-outlined"
      [aria-pressed]="underlined.selected()"
     translate="no">
      format_underlined
    </button>
  </div>

  <div class="w-px self-center h-[calc(100%-1rem)] bg-gray-300" role="separator"></div>

  <div ngToolbarWidgetGroup role="radiogroup" class="gap-2 flex" aria-label="Text alignment options">
    <button
      ngToolbarWidget
      role="radio"
      type="button"
      value="align left"
      aria-label="align left"
      #leftAlign="ngToolbarWidget"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 aria-checked:text-pink-600 aria-checked:bg-pink-500/10 material-symbols-outlined"
      [aria-checked]="leftAlign.selected()"
     translate="no">
      format_align_left
    </button>

    <button
      ngToolbarWidget
      role="radio"
      type="button"
      value="align center"
      aria-label="align center"
      #centerAlign="ngToolbarWidget"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 aria-checked:text-pink-600 aria-checked:bg-pink-500/10 material-symbols-outlined"
      [aria-checked]="centerAlign.selected()"
     translate="no">
      format_align_center
    </button>

    <button
      ngToolbarWidget
      role="radio"
      type="button"
      value="align right"
      aria-label="align right"
      #rightAlign="ngToolbarWidget"
      class="border-none cursor-pointer p-2 rounded text-xl bg-transparent text-gray-900 hover:bg-gray-900/10 active:bg-gray-900/15 focus:-outline-offset-1 focus:outline focus:outline-1 focus:outline-pink-500/60 aria-checked:text-pink-600 aria-checked:bg-pink-500/10 material-symbols-outlined"
      [aria-checked]="rightAlign.selected()"
     translate="no">
      format_align_right
    </button>
  </div>
</div>
