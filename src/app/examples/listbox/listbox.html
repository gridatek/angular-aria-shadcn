<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />

<div class="w-52 h-44 p-2 rounded-lg bg-gray-100 text-sm">
  <div ngListbox value="Option 1" class="gap-0.5 h-full flex overflow-auto flex-col">
    @for (option of options; track option) {
    <div ngOption [value]="option" class="flex cursor-pointer items-center m-px px-4 min-h-9 rounded-lg hover:bg-gray-900/5 data-[active=true]:outline data-[active=true]:outline-2 data-[active=true]:-outline-offset-2 data-[active=true]:outline-pink-500/50 aria-selected:text-pink-500 aria-selected:bg-pink-500/5 [&:not([aria-selected=true])_.example-option-check]:hidden">
      <span class="flex-1">{{ option }}</span>
      <span class="example-option-check text-sm material-symbols-outlined" translate="no">check</span>
    </div>
    }
  </div>
</div>
